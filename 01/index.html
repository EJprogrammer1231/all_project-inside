<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <section>
    <h1>Smart To-Do List</h1>
    <input id="inputUser" placeholder="Enter your task">
    <button id="inputButton">Add</button>

    <ul id="display"></ul>

    <p>Total Tasks:<span id="totalTask">0</span></p>
    <p>Completed Tasks:<span id="completedTask">0</span></p>
    <p>Remaining Tasks:<span id="reaminingTask">0</span></p>
  </section>

  <script>
    const inputUser = document.getElementById("inputUser");
    const inputButton = document.getElementById("inputButton");

    const display = document.getElementById("display");

    const totalTask = document.getElementById("totalTask");
    const completedTask = document.getElementById("completedTask");
    const reaminingTask = document.getElementById("reaminingTask");

    inputButton.addEventListener("click",function() {
      const user_input_Area = inputUser.value.trim();

      if (!user_input_Area) {
        alert("Please enter a task");
        return;
      }

      const li = document.createElement("li");
      li.textContent = user_input_Area;

      const btn = document.createElement("button");
      btn.textContent = "delete"

      btn.addEventListener("click",function() {
        li.remove();
      });

      li.appendChild(btn);
      display.appendChild(li);

      display.appendChild(li);

      const tasks = display.querySelectorAll("li");
      totalTask.textContent = tasks.length;
      });
  </script>
</body>
</html>
